name: Deploy Backend

on:
  push:
    branches:
      - develop
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ./backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
        run: python manage.py test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/7574522149/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-deployer@gen-lang-client-0248828390.iam.gserviceaccount.com'

      - uses: google-github-actions/setup-gcloud@v2

      - name: Set environment variables by branch
        run: |
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "ENV_NAME=prod" >> $GITHUB_ENV
            echo "SERVICE_NAME=vetlab-backend" >> $GITHUB_ENV
            echo "SETTINGS_MODULE=config.settings.prod" >> $GITHUB_ENV
            echo "FRONTEND_URL=https://vetlab-frontend-7574522149.us-central1.run.app" >> $GITHUB_ENV
            echo "CORS_ORIGINS=https://vetlab-frontend-7574522149.us-central1.run.app,https://vetlab-frontend.uc.r.appspot.com,https://vetlab-frontend-wywxkt3ffa-uc.a.run.app" >> $GITHUB_ENV
            echo "ALLOWED_HOSTS=.run.app,localhost,127.0.0.1" >> $GITHUB_ENV
          else
            echo "ENV_NAME=staging" >> $GITHUB_ENV
            echo "SERVICE_NAME=vetlab-backend-staging" >> $GITHUB_ENV
            echo "SETTINGS_MODULE=config.settings.staging" >> $GITHUB_ENV
            echo "FRONTEND_URL=https://vetlab-frontend-staging-wywxkt3ffa-uc.a.run.app" >> $GITHUB_ENV
            echo "CORS_ORIGINS=https://vetlab-frontend-staging-wywxkt3ffa-uc.a.run.app,https://vetlab-frontend-staging.uc.r.appspot.com,https://vetlab-frontend-wywxkt3ffa-uc.a.run.app" >> $GITHUB_ENV
            echo "ALLOWED_HOSTS=.run.app,localhost,127.0.0.1" >> $GITHUB_ENV
          fi

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build & Push image
        working-directory: ./backend
        run: |
          IMAGE=us-central1-docker.pkg.dev/gen-lang-client-0248828390/vetlab-repo/backend:${{ env.ENV_NAME }}-${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Run migrations
        run: |
          gcloud run jobs deploy migrate-job-${{ env.ENV_NAME }} \
            --image ${{ env.IMAGE }} \
            --region us-central1 \
            --set-cloudsql-instances gen-lang-client-0248828390:us-central1:vetlab-db \
            --set-env-vars "^#^DJANGO_SETTINGS_MODULE=${{ env.SETTINGS_MODULE }}#GCP_PROJECT_ID=gen-lang-client-0248828390#GS_BUCKET_NAME=dummy#ALLOWED_HOSTS=${{ env.ALLOWED_HOSTS }}#CORS_ALLOWED_ORIGINS=${{ env.CORS_ORIGINS }}#CSRF_TRUSTED_ORIGINS=${{ env.CORS_ORIGINS }}#EMAIL_HOST=dummy#EMAIL_HOST_USER=dummy#EMAIL_HOST_PASSWORD=dummy" \
            --set-secrets SECRET_KEY=django-secret-key-${{ env.ENV_NAME }}:latest,DATABASE_URL=database-url-${{ env.ENV_NAME }}:latest \
            --command python,manage.py,migrate
          gcloud run jobs execute migrate-job-${{ env.ENV_NAME }} --region us-central1 --wait

      - name: Seed Roles & Permisos
        run: |
          gcloud run jobs deploy seed-roles-job-${{ env.ENV_NAME }} \
            --image ${{ env.IMAGE }} \
            --region us-central1 \
            --set-cloudsql-instances gen-lang-client-0248828390:us-central1:vetlab-db \
            --set-env-vars "^#^DJANGO_SETTINGS_MODULE=${{ env.SETTINGS_MODULE }}#GCP_PROJECT_ID=gen-lang-client-0248828390#GS_BUCKET_NAME=dummy#ALLOWED_HOSTS=${{ env.ALLOWED_HOSTS }}#CORS_ALLOWED_ORIGINS=${{ env.CORS_ORIGINS }}#CSRF_TRUSTED_ORIGINS=${{ env.CORS_ORIGINS }}#EMAIL_HOST=dummy#EMAIL_HOST_USER=dummy#EMAIL_HOST_PASSWORD=dummy" \
            --set-secrets SECRET_KEY=django-secret-key-${{ env.ENV_NAME }}:latest,DATABASE_URL=database-url-${{ env.ENV_NAME }}:latest \
            --command python,manage.py,seed_roles_permisos
          gcloud run jobs execute seed-roles-job-${{ env.ENV_NAME }} --region us-central1 --wait

      - name: Create Superuser (Staging)
        if: env.ENV_NAME == 'staging'
        run: |
          gcloud run jobs deploy create-superuser-job-${{ env.ENV_NAME }} \
            --image ${{ env.IMAGE }} \
            --region us-central1 \
            --set-cloudsql-instances gen-lang-client-0248828390:us-central1:vetlab-db \
            --set-env-vars "^#^DJANGO_SETTINGS_MODULE=${{ env.SETTINGS_MODULE }}#GCP_PROJECT_ID=gen-lang-client-0248828390#GS_BUCKET_NAME=dummy#ALLOWED_HOSTS=${{ env.ALLOWED_HOSTS }}#CORS_ALLOWED_ORIGINS=${{ env.CORS_ORIGINS }}#CSRF_TRUSTED_ORIGINS=${{ env.CORS_ORIGINS }}#EMAIL_HOST=dummy#EMAIL_HOST_USER=dummy#EMAIL_HOST_PASSWORD=dummy#DJANGO_SUPERUSER_USERNAME=admin_staging#DJANGO_SUPERUSER_EMAIL=admin@staging.laclivet.com#DJANGO_SUPERUSER_PASSWORD=${{ secrets.STAGING_SUPERUSER_PASSWORD }}#DJANGO_SUPERUSER_FIRST_NAME=Admin#DJANGO_SUPERUSER_LAST_NAME=Staging" \
            --set-secrets SECRET_KEY=django-secret-key-${{ env.ENV_NAME }}:latest,DATABASE_URL=database-url-${{ env.ENV_NAME }}:latest \
            --command python,manage.py,crear_superusuario
          gcloud run jobs execute create-superuser-job-${{ env.ENV_NAME }} --region us-central1 --wait || echo "Superuser already exists"

      - name: Create Superuser (Production)
        if: env.ENV_NAME == 'prod'
        run: |
          gcloud run jobs deploy create-superuser-job-${{ env.ENV_NAME }} \
            --image ${{ env.IMAGE }} \
            --region us-central1 \
            --set-cloudsql-instances gen-lang-client-0248828390:us-central1:vetlab-db \
            --set-env-vars "^#^DJANGO_SETTINGS_MODULE=${{ env.SETTINGS_MODULE }}#GCP_PROJECT_ID=gen-lang-client-0248828390#GS_BUCKET_NAME=dummy#ALLOWED_HOSTS=${{ env.ALLOWED_HOSTS }}#CORS_ALLOWED_ORIGINS=${{ env.CORS_ORIGINS }}#CSRF_TRUSTED_ORIGINS=${{ env.CORS_ORIGINS }}#EMAIL_HOST=dummy#EMAIL_HOST_USER=dummy#EMAIL_HOST_PASSWORD=dummy#DJANGO_SUPERUSER_USERNAME=admin_prod#DJANGO_SUPERUSER_EMAIL=admin@production.laclivet.com#DJANGO_SUPERUSER_PASSWORD=${{ secrets.PROD_SUPERUSER_PASSWORD }}#DJANGO_SUPERUSER_FIRST_NAME=Admin#DJANGO_SUPERUSER_LAST_NAME=Production" \
            --set-secrets SECRET_KEY=django-secret-key-${{ env.ENV_NAME }}:latest,DATABASE_URL=database-url-${{ env.ENV_NAME }}:latest \
            --command python,manage.py,crear_superusuario,--force
          gcloud run jobs execute create-superuser-job-${{ env.ENV_NAME }} --region us-central1 --wait || echo "Superuser already exists"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances gen-lang-client-0248828390:us-central1:vetlab-db \
            --set-env-vars "^#^DJANGO_SETTINGS_MODULE=${{ env.SETTINGS_MODULE }}#ALLOWED_HOSTS=${{ env.ALLOWED_HOSTS }}#CORS_ALLOWED_ORIGINS=${{ env.CORS_ORIGINS }}#CSRF_TRUSTED_ORIGINS=${{ env.CORS_ORIGINS }}#GCP_PROJECT_ID=gen-lang-client-0248828390#GS_BUCKET_NAME=dummy#EMAIL_HOST=dummy#EMAIL_HOST_USER=dummy#EMAIL_HOST_PASSWORD=dummy" \
            --set-secrets SECRET_KEY=django-secret-key-${{ env.ENV_NAME }}:latest,DATABASE_URL=database-url-${{ env.ENV_NAME }}:latest \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 3