name: Deploy Frontend

on:
  push:
    branches:
      - develop
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/7574522149/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-deployer@gen-lang-client-0248828390.iam.gserviceaccount.com'

      - uses: google-github-actions/setup-gcloud@v2

      - name: Set environment variables by branch
        run: |
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "ENV_NAME=prod" >> $GITHUB_ENV
            echo "SERVICE_NAME=vetlab-frontend" >> $GITHUB_ENV
          else
            echo "ENV_NAME=staging" >> $GITHUB_ENV
            echo "SERVICE_NAME=vetlab-frontend-staging" >> $GITHUB_ENV
          fi

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build & Push image
        working-directory: ./frontend
        run: |
          IMAGE=us-central1-docker.pkg.dev/gen-lang-client-0248828390/vetlab-repo/frontend:${{ env.ENV_NAME }}-${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 256Mi \
            --min-instances 0 \
            --max-instances 3